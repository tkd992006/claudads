appId: app.claudeshift.desktop
productName: ClaudeShift
# npm workspaces 가 electron 을 루트 node_modules 로 hoist 해서 electron-builder
# 가 desktop/node_modules 에서 못 찾는다 → 버전을 명시해서 우회.
# package.json 의 ^33.2.0 과 일치시키되 실제 설치된 33.4.11 을 박는다.
electronVersion: 33.4.11
directories:
  output: release
files:
  - out/**
  - node_modules/**
  - "!**/*.map"

# 다운로드 URL 안정화 — `releases/latest/download/<artifactName>` 로 마케팅
# 페이지를 박아둘 수 있게 OS·arch 기반 고정 패턴 사용.
# 예: ClaudeShift-0.1.0-mac-x64.dmg
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        # arm64 도 같이 뿌리고 싶으면 아래 줄 주석 해제. native 모듈(node-pty)
        # 의 arm64 prebuilt 가 npm install 시 받아져 있어야 함.
        # - arm64
  # === 서명 / 노타리제이션 ===
  # hardenedRuntime + notarize 조합은 macOS Catalina+ 에서 외부 배포의 사실상 필수.
  # 안 하면 사용자 첫 실행에서 "확인되지 않은 개발자" 차단 → 다운로드 컨버전 망함.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 키체인에 다른 Apple 인증서(Apple Development 등) 가 같이 있으니 명시.
  # 정확히 이 Common Name 이 키체인 "내 인증서" 에 있어야 함.
  # electron-builder 25.x 가 "Developer ID Application:" 접두사를 거부 — 본문만.
  identity: "On The Market Co., Ltd. (722CL38AM4)"
  notarize:
    teamId: 722CL38AM4

dmg:
  # 설치 UX — DMG 열면 좌측 앱 아이콘, 우측 /Applications 별칭. 드래그-앤-드롭.
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - nsis
  # 윈도우 코드사인은 EV 인증서 비용 부담이라 런칭 전 보류 — 그대로 미서명 배포.

linux:
  target:
    - AppImage

asarUnpack:
  - "**/node_modules/node-pty/**"
